<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="header">
    <h1>Dashboard Mahasiswa</h1>
</div>

<div class="container">

    <div class="top-bar">
        <a th:href="@{/form}" class="btn-small">+ Input Data</a>
        <a th:href="@{/logout}" class="btn-small">Logout</a>
    </div>

    <table class="table-mhs">
        <thead>
        <tr>
            <th>No</th>
            <th>Nama</th>
            <th>NIM</th>
            <th>Jenis Kelamin</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="mhs, iter : ${listUser}">
            <td th:text="${iter.count}">1</td>
            <td th:text="${mhs.nama}"></td>
            <td th:text="${mhs.nim}"></td>
            <td th:text="${mhs.jenisKelamin}"></td>
        </tr>

        <tr th:if="${#lists.isEmpty(listUser)}">
            <td colspan="4" class="empty-msg">Belum ada data</td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
